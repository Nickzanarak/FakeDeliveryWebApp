<div class="bg-[#2a2a2a] min-h-screen p-8">

    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
        <h2 class="text-white text-2xl font-bold">จัดการสินค้า</h2>
        <div class="bg-[#3a3a3a] px-4 py-2 rounded-lg">
            <span class="text-gray-400 text-sm">สินค้าทั้งหมด </span>
            <span class="text-[#f4a500] font-bold">{{ products.length }} รายการ</span>
        </div>
    </div>

    <!-- Table Header -->
    <div class="bg-[#1a1a1a] rounded-t-xl px-6 py-3 grid grid-cols-5 gap-4">
        <p class="text-gray-400 text-sm font-bold">รูป</p>
        <p class="text-gray-400 text-sm font-bold">ชื่อสินค้า</p>
        <p class="text-gray-400 text-sm font-bold">คำอธิบาย</p>
        <p class="text-gray-400 text-sm font-bold">ราคา</p>
        <p class="text-gray-400 text-sm font-bold text-right">จัดการ</p>
    </div>

    <!-- Product List -->
    <div class="flex flex-col">
        <div *ngFor="let product of products; let i = index"
            [class]="i % 2 === 0 ? 'bg-[#3a3a3a] px-6 py-4 grid grid-cols-5 gap-4 items-center' :
                                    'bg-[#333] px-6 py-4 grid grid-cols-5 gap-4 items-center'">

            <!-- รูป -->
            <img *ngIf="product.imageUrl" [src]="'http://localhost:5231' + product.imageUrl"
                class="w-12 h-12 object-cover rounded-lg" />
            <div *ngIf="!product.imageUrl"
                class="w-12 h-12 bg-[#555] rounded-lg flex items-center justify-center text-gray-400">
                🍽️
            </div>

            <!-- ชื่อ -->
            <p class="text-white font-bold">{{ product.name }}</p>

            <!-- คำอธิบาย -->
            <p class="text-gray-400 text-sm truncate">{{ product.description || '-' }}</p>

            <!-- ราคา -->
            <p class="text-[#f4a500] font-bold">{{ product.price }} บาท</p>

            <!-- Actions -->
            <div class="flex justify-end gap-2">
                <button (click)="editProduct(product)"
                    class="bg-[#f4a500] text-white px-3 py-2 rounded-lg border-none cursor-pointer hover:bg-[#666] text-sm font-bold">
                     แก้ไข
                </button>
                <button (click)="deleteProduct(product)"
                    class="bg-red-600 text-white px-3 py-2 rounded-lg border-none cursor-pointer hover:bg-red-700 text-sm font-bold">
                     ลบ
                </button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="bg-[#1a1a1a] rounded-b-xl px-6 py-3">
    </div>

    <!-- Back Button -->
    <div class="flex justify-end mt-6">
        <button (click)="goBack()"
            class="bg-[#555] text-white px-6 py-3 rounded-lg border-none cursor-pointer hover:bg-[#666] font-bold">
            กลับ
        </button>
    </div>

    <!-- Edit Modal -->
    <div *ngIf="selectedProduct" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50">
        <div class="bg-[#3a3a3a] rounded-2xl p-8 w-full max-w-md flex flex-col gap-4">
            <h3 class="text-white text-xl font-bold mb-2">แก้ไขสินค้า</h3>

            <div class="flex flex-col items-center gap-2">
                <div (click)="fileInput.click()"
                    class="w-40 h-40 bg-[#1a1a1a] rounded-xl flex flex-col items-center justify-center cursor-pointer hover:bg-[#333] overflow-hidden">
                    <img *ngIf="previewUrl" [src]="previewUrl" class="w-full h-full object-cover" />
                    <img *ngIf="!previewUrl && selectedProduct.imageUrl" 
                        [src]="'http://localhost:5231' + selectedProduct.imageUrl" 
                        class="w-full h-full object-cover" />
                    <div *ngIf="!previewUrl && !selectedProduct.imageUrl" class="text-gray-400 text-center">
                        <p class="text-3xl mb-1">📷</p>
                        <p class="text-sm">คลิกเพื่อเพิ่มรูป</p>
                    </div>
                </div>
                <input #fileInput type="file" accept="image/*" class="hidden" (change)="onFileSelected($event)" />
                <p class="text-gray-400 text-xs">คลิกที่รูปเพื่อเปลี่ยน</p>
            </div>

            <div class="flex flex-col gap-1">
                <label class="text-gray-400 text-sm">ชื่อสินค้า :</label>
                <input [(ngModel)]="editName" type="text"
                    class="bg-[#555] text-white px-4 py-2 rounded-lg border-none outline-none" />
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-gray-400 text-sm">คำอธิบาย :</label>
                <input [(ngModel)]="editDescription" type="text"
                    class="bg-[#555] text-white px-4 py-2 rounded-lg border-none outline-none" />
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-gray-400 text-sm">ราคา :</label>
                <input [(ngModel)]="editPrice" type="number"
                    class="bg-[#555] text-white px-4 py-2 rounded-lg border-none outline-none" />
            </div>

            <p *ngIf="errorMessage" class="text-red-400 text-sm">{{ errorMessage }}</p>

            <div class="flex justify-end gap-3 mt-2">
                <button (click)="cancelEdit()"
                    class="bg-[#555] text-white px-6 py-2 rounded-lg border-none cursor-pointer hover:bg-[#666] font-bold">
                    ยกเลิก
                </button>
                <button (click)="saveEdit()"
                    class="bg-[#f4a500] text-white px-6 py-2 rounded-lg border-none cursor-pointer hover:bg-orange-600 font-bold">
                    บันทึก
                </button>
            </div>
        </div>
    </div>

</div>
