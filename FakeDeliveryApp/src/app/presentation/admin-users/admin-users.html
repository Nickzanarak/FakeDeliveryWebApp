<div class="bg-[#2a2a2a] min-h-screen p-8">
    
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
        <div class="flex items-center gap-4">
            
            <h2 class="text-white text-2xl font-bold">จัดการผู้ใช้</h2>
        </div>
        <div class="bg-[#3a3a3a] px-4 py-2 rounded-lg">
            <span class="text-gray-400 text-sm">ผู้ใช้ทั้งหมด </span>
            <span class="text-[#f4a500] font-bold">{{ users.length }} คน</span>
        </div>
    </div>

    <!-- Table Header -->
    <div class="bg-[#1a1a1a] rounded-t-xl px-6 py-3 grid grid-cols-4 gap-4">
        <p class="text-gray-400 text-sm font-bold">ชื่อ</p>
        <p class="text-gray-400 text-sm font-bold">Username</p>
        <p class="text-gray-400 text-sm font-bold">Role</p>
        <p class="text-gray-400 text-sm font-bold text-right">จัดการ</p>
    </div>

    <!-- User List -->
    <div class="flex flex-col">
        <div *ngFor="let user of users; let i = index"
            [class]="i % 2 === 0 ? 'bg-[#3a3a3a] px-6 py-4 grid grid-cols-4 gap-4 items-center' : 
                                    'bg-[#333] px-6 py-4 grid grid-cols-4 gap-4 items-center'">
            
            <!-- ชื่อ -->
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full flex items-center justify-center font-bold text-white text-lg"
                    [class]="user.role === 'admin' ? 'bg-[#f4a500]' : 'bg-[#555]'">
                    {{ user.name.charAt(0).toUpperCase() }}
                </div>
                <p class="text-white font-bold">{{ user.name }}</p>
            </div>

            <!-- Username -->
            <p class="text-gray-400 text-sm">@{{ user.username }}</p>

            <!-- Role Badge -->
            <div>
                <span [class]="user.role === 'admin' ? 
                    'bg-[#f4a500] text-white text-xs px-3 py-1 rounded-full font-bold' : 
                    'bg-[#555] text-white text-xs px-3 py-1 rounded-full font-bold'">
                    {{ user.role === 'admin' ? '👑 Admin' : '👤 User' }}
                </span>
            </div>

            <!-- Actions -->
            <div class="flex justify-end gap-2">
                <button *ngIf="user.role === 'user'" (click)="changeRole(user, 'admin')"
                    class="bg-[#f4a500] text-white px-4 py-2 rounded-lg border-none cursor-pointer font-bold hover:bg-orange-600 text-sm">
                    เปลี่ยนเป็น Admin
                </button>
                <button *ngIf="user.role === 'admin' && user.id !== currentUserId" (click)="changeRole(user, 'user')"
                    class="bg-[#555] text-white px-4 py-2 rounded-lg border-none cursor-pointer font-bold hover:bg-[#666] text-sm">
                    เปลี่ยนเป็น User
                </button>
                <span *ngIf="user.role === 'admin' && user.id === currentUserId"
                    class="text-gray-500 text-sm italic">
                    (คุณ)
                </span>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="bg-[#1a1a1a] rounded-b-xl px-6 py-3 flex justify-between">
        <span class="text-gray-400 text-sm">
            👑 Admin {{ adminCount }} คน
        </span>
        <span class="text-gray-400 text-sm">
            👤 User {{ userCount }} คน
        </span>
    </div>

    <div class="flex justify-end mt-6">
        <button (click)="goBack()"
            class="bg-[#555] text-white px-6 py-3 rounded-lg border-none cursor-pointer hover:bg-[#666] font-bold">
            กลับ
        </button>
    </div>

</div>
